<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFAN - Login</title>
    <meta name="description" content="Login to Smart Financial Analysis Network">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-bg">
    <div class="glass-container login-box">
        <div class="logo" style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 30px;">
            <img src="assets/sfan_logo.png" alt="SFAN Logo" style="width: 140px; height: auto; border-radius: 8px;">
            <div style="text-align: left;">
                <h1 style="margin-bottom: 4px;">SFAN</h1>
                <p style="margin-bottom: 0;">Smart Financial Analysis Network</p>
            </div>
        </div>
        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="admin@sfan.com">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" required placeholder="••••••••">
                    <span class="toggle-password" id="togglePassword">👁️</span>
                </div>
            </div>
            <div class="auth-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe"> Remember Me
                </label>
                <a href="#" class="forgot-password" onclick="alert('Password recovery flow would go here.')">Forgot Password?</a>
            </div>
            <button type="submit" class="btn-primary">Secure Sign In</button>
        </form>
        <p class="error-msg" id="errorMsg"></p>
    </div>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
